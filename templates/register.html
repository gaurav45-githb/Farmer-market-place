{% extends "base.html" %}
{% block title %} Register Page {% endblock %}

{% block extra_css %}
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    /* display: flex; */
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  .register-box {
    margin: auto;
    background: whitesmoke;
    padding: 25px;
    width: 320px;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
  }

  .register-box h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  .register-box input {
    width: 100%;
    padding: 10px 5px;
    margin: 8px 0px;
    border: 1px solid #ccc;
    border-radius: 7px;
    font-size: 14px;
  }

  .register-box button {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    background: #4CAF50;
    border: none;
    color: #fff;
    font-size: 16px;
    border-radius: 10px;
    cursor: pointer;
  }

  .register-box button:hover {
    background: #45a049;
  }

  div p {
    margin-top: 15px;
    text-align: center;

  }
</style>
{% endblock %}
{% block content %}
<div class="register-box">
  <h2>Register</h2>
  <form action="{{url_for('register')}}" method="POST">
    <label for="">Name</label>
    <input type="text"name="name" placeholder="Full Name" required>
    <label for="">Mobail Number</label>
    <input type="tel" name="mno" placeholder="Mobile Number" required>
    <label for="">Email</label>
    <input type="email" name ="email" placeholder="Email" required>
    <label for="">Password</label>
    <input type="password" name="password" placeholder="Password" required>
    <label for="">Confirm Password</label>
    <input type="password" name="confirm_password" placeholder="Confirm Password" required>
    <button type="submit">Submit</button>
    <p>alerdy have an account <a href="{{url_for('login')}}">Login</a></p>
  </form>
</div>
{% endblock %}
